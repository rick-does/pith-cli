name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: pth --help
        run: pth --help

      - name: pth scan
        run: pth scan CLAUDE.md

      - name: pth stats
        run: pth stats CLAUDE.md

      - name: pth structure
        run: pth structure CLAUDE.md

      - name: pth structure --depth 2
        run: pth structure CLAUDE.md --depth 2

      - name: pth check
        run: pth check CLAUDE.md

      - name: pth extract
        run: pth extract CLAUDE.md --output text

      - name: pth compare
        run: pth compare CLAUDE.md README.md

      - name: pth extract json output
        run: pth extract CLAUDE.md --output json
